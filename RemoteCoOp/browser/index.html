<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenNOW Remote Co-Op</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="lobby" id="join-card" aria-label="Remote Co-Op lobby">
        <section class="poster-screen" aria-label="Remote Co-Op stream preview"></section>

        <section class="join-panel" aria-label="Join Remote Co-Op room">
          <label class="field" for="display-name">
            <span>Name</span>
            <input id="display-name" autocomplete="nickname" maxlength="32" placeholder="Guest">
          </label>
          <label class="field token-field" for="invite-token">
            <span>Invite token</span>
            <textarea id="invite-token" rows="4" spellcheck="false" placeholder="Paste token"></textarea>
          </label>
          <button id="join-button" type="button">Join Room</button>
          <p class="status" id="join-status" role="status">Waiting for invite.</p>
        </section>
      </section>

      <section class="session-deck hidden" id="session-card" aria-label="Active Remote Co-Op session">
        <div class="video-frame">
          <div class="video-placeholder">
            <span>Waiting for host</span>
            <p>Video appears here after approval.</p>
          </div>
          <div class="player-badge" id="player-badge" aria-live="polite">
            <span id="player-label">Waiting</span>
            <strong id="player-number">P?</strong>
          </div>
          <button id="diagnostics-toggle" class="diagnostics-toggle" type="button" aria-expanded="false" aria-controls="diagnostics-panel">i</button>
          <div class="diagnostics" id="diagnostics-panel" hidden>
            <div class="diagnostics-bar">
              <span class="status-label">Diagnostics</span>
              <button id="copy-diagnostics-button" class="secondary compact" type="button">Copy</button>
            </div>
            <dl id="diagnostics-list"></dl>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="./app.js?v=invite-init-20260712"></script>
  </body>
</html>
