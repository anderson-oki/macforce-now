<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MacForce Now Remote Co-Op</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="home" id="join-card" aria-label="Remote Co-Op home">
        <header class="topbar">
          <a class="brand" href="./" aria-label="MacForce Now Remote Co-Op home">
            <span class="brand-mark" aria-hidden="true"></span>
            <span class="brand-text">MacForce Now</span>
          </a>
          <span class="mode-pill" id="network-state">CODE</span>
        </header>

        <section class="entry-stage" aria-labelledby="title">
          <div class="signal-mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>

          <section class="join-console" aria-label="Join Remote Co-Op room">
            <p class="eyebrow" id="invite-source">REMOTE CO-OP</p>
            <h1 id="title">CO-OP</h1>
            <p id="subtitle" class="sr-only">Enter an invite code and join.</p>

            <label class="field code-field" for="invite-code">
              <span>Code</span>
              <input id="invite-code" inputmode="text" autocomplete="one-time-code" maxlength="128" spellcheck="false" placeholder="ABC123" aria-describedby="join-status">
            </label>

            <label class="field" for="display-name">
              <span>Player</span>
              <input id="display-name" autocomplete="nickname" maxlength="32" placeholder="Guest">
            </label>

            <button id="join-button" type="button">Join</button>
            <p class="status" id="join-status" role="status">Code required</p>
          </section>
        </section>

        <section class="micro-status" aria-label="Remote Co-Op status">
          <span id="network-detail">Automatic</span>
          <span id="gamepad-name">Controller</span>
          <span id="gamepad-detail">Waiting</span>
          <span id="session-state">Home</span>
          <span id="session-detail">Idle</span>
        </section>
      </section>

      <section class="session-deck hidden" id="session-card" aria-label="Active Remote Co-Op session">
        <div class="video-frame">
          <div class="video-placeholder">
            <span>Waiting</span>
            <p>Host</p>
          </div>
          <div class="player-badge" id="player-badge" aria-live="polite" aria-label="Waiting for controller assignment">
            <span class="player-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M7.2 9.2h9.6c2.1 0 3.8 1.5 4.1 3.6l.5 3.5c.2 1.4-.9 2.7-2.3 2.7-.7 0-1.4-.3-1.8-.9l-1.6-2.1H8.3l-1.6 2.1c-.4.6-1.1.9-1.8.9-1.4 0-2.5-1.3-2.3-2.7l.5-3.5c.3-2.1 2-3.6 4.1-3.6Z" />
                <path d="M8 12v3M6.5 13.5h3M15.5 13.2h.1M18 14.8h.1" />
              </svg>
            </span>
            <strong id="player-number">P?</strong>
          </div>
          <button id="disconnect-button" class="disconnect-button" type="button">Leave</button>
          <button id="diagnostics-toggle" class="diagnostics-toggle" type="button" aria-expanded="false" aria-controls="diagnostics-panel">i</button>
          <div class="diagnostics" id="diagnostics-panel" hidden>
            <div class="diagnostics-bar">
              <span class="status-label">Diagnostics</span>
              <button id="copy-diagnostics-button" class="secondary compact" type="button">Copy</button>
            </div>
            <dl id="diagnostics-list"></dl>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="./app.js?v=minimal-home-20260712"></script>
  </body>
</html>
