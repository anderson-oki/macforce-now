name: Unit Tests

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  test:
    name: Run Package Unit Tests
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - Backend
          - CloudMatch
          - Common
          - GDN
          - Jarvis
          - LCARS
          - NesAuth
          - NetworkTest
          - Ragnarok
          - SignalLinkKit
          - Starfleet
          - UDS

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up environment
        run: |
          echo "Using macOS runner"
          uname -a

      - name: Run unit tests
        run: |
          set -euo pipefail
          if [[ -d "${{ matrix.package }}/Tests" ]]; then
            swift test --package-path "${{ matrix.package }}"
          else
            swift build --package-path "${{ matrix.package }}"
          fi
        shell: bash
