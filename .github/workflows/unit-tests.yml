name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  test:
    name: Run Package Unit Tests
    runs-on: macos-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        package:
          - GFN.CloudMatch
          - GFN.GDN
          - GFN.Jarvis
          - GFN.LCARS
          - GFN.NesAuth
          - GFN.NetworkTest
          - GFN.Ragnarok
          - GFN.Starfleet
          - GFN.UDS
          - OPN.Auth
          - OPN.Common
          - OPN.GameServices
          - OPN.SignalLinkKit
          - OPN.Telemetry
          - OPN.WebRTC.Media

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up environment
        run: |
          echo "Using macOS runner"
          uname -a

      - name: Run unit tests
        run: |
          set -euo pipefail
          if [[ -d "${{ matrix.package }}/Tests" ]]; then
            swift test --package-path "${{ matrix.package }}"
          else
            swift build --package-path "${{ matrix.package }}"
          fi
        shell: bash

  app-build:
    name: Build macOS App
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up environment
        run: |
          echo "Using macOS runner"
          uname -a
          xcodebuild -version
        shell: bash

      - name: Build OpenNOW
        run: |
          set -euo pipefail
          xcodebuild build \
            -project OpenNOW.xcodeproj \
            -scheme OpenNOW \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
        shell: bash
