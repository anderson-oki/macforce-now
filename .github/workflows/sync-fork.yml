name: Sync Upstream

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Mirror upstream
        run: |
          git remote add upstream https://github.com/OpenCloudGaming/OpenNOW-Mac.git
          git fetch upstream main
          git push origin "refs/remotes/upstream/main:refs/heads/upstream" --force
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for changes
        run: |
          git fetch origin main upstream
          if git merge-base --is-ancestor upstream/main origin/main; then
            echo "BEHIND=false" >> $GITHUB_OUTPUT
          else
            echo "BEHIND=true" >> $GITHUB_OUTPUT
          fi
        id: status

      - name: Open PR
        if: steps.status.outputs.BEHIND == 'true'
        run: |
          gh pr create \
            --base main \
            --head upstream \
            --title "chore: sync upstream" \
            --body "Upstream has new commits. Review and merge into main." \
            --label "upstream-sync" || true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
